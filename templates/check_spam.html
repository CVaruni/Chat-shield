{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2 class="text-center mb-4">CHAT-SHIELD Message Check</h2>
    <form method="POST">
        <div class="mb-3">
            <label for="message" class="form-label">Enter your message</label>
            <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">Check Message</button>
    </form>
</div>
{% endblock %}
